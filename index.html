    .panel{display:none;margin-top:14px}.panel.active{display:block}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;color:var(--muted)}.chip.active{background:var(--main);border-color:var(--main);color:white}.chip:disabled{opacity:.35}.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px;margin:10px 0;border:1px solid rgba(219,228,237,.75)}.card.mainTeam{border-left:6px solid var(--main)}.matchTop{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;font-weight:800}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center;margin-top:10px}.team{display:flex;align-items:center;gap:8px;min-width:0}.team.right{justify-content:flex-end;text-align:right}.teamName{font-weight:900;font-size:14px;overflow-wrap:anywhere}.score{font-size:20px;font-weight:1000;min-width:54px;text-align:center}.muted{color:var(--muted)} select,input{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px;font-size:15px}.sectionTitle{font-size:17px;margin:18px 0 10px}.gridGroups{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}.table th:first-child,.table td:first-child{text-align:left}.table tr.mainTeam{background:var(--main2);font-weight:900}.places{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}.place{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:10px}.place.mainTeam{border-color:var(--main);background:var(--main2);font-weight:900}.placeNum{font-weight:1000;width:38px;color:var(--main)}.admin{position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:20;display:none;padding:18px;overflow:auto}.admin.open{display:block}.adminBox{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:16px;box-shadow:var(--shadow)}.btn{border:0;background:var(--main);color:white;border-radius:14px;padding:11px 14px;font-weight:900}.btn.secondary{background:#edf2f7;color:#1f2937}.btn.danger{background:#b42318}.btnRow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.status{font-size:13px;color:var(--muted)}@media(max-width:430px){.app{padding-left:10px;padding-right:10px}.banner h2{font-size:19px}.crest.big{width:46px;height:46px}.teams{grid-template-columns:1fr 58px 1fr}.team{flex-direction:column;align-items:flex-start}.team.right{align-items:flex-end}.tab{font-size:11px}.score{font-size:18px}.card{padding:11px}}
  
    /* v1.1 ajustes visuales */

    @media(max-width:520px){.banner{padding:10px 10px 14px}.bannerCompactTop{grid-template-columns:1fr;gap:5px}.bannerCompactTop .bannerInfo,.bannerCompactTop small{justify-self:center}.bannerTeams{gap:8px}.bannerTeamName{font-size:12px}.bannerCenterBox{min-width:108px;padding:8px 10px}.bannerCenterBox .time{font-size:24px}.bannerCenterBox .date,.bannerCenterBox .field{font-size:11px}.teams{gap:7px}.team{gap:6px;flex-direction:column;align-items:center;text-align:center}.team.right{align-items:center;text-align:center}.teamName{font-size:12px}.crest{width:34px;height:34px}.centerBox{min-width:88px;padding:6px 8px}.centerBox .time{font-size:18px}.centerBox .scoreText{font-size:18px}.centerBox .date,.centerBox .field{font-size:10px}.matchTop .phaseLabel,.matchTop .codeLabel{font-size:10px;padding:4px 7px}}

    /* v1.8: favorito más visible + un único actualizar bajo el menú */

      border:2px solid #155d2c!important;

      margin-left:auto;

    .refreshInline.loading{opacity:.75}
    .refreshInline.ok{background:#e9f7ef;border-color:#80c28c;color:#0f7b2f}

    .card.mainTeam{background:linear-gradient(90deg,#dff1e5,#ffffff 72%)!important;border:2px solid #0f5d2c!important;border-left:9px solid #0f5d2c!important}

<body>
<div class="app">
  <header class="top"><div class="title"><h1 id="appTitle">Waterpolo</h1><p id="appSub">Cargando campeonato…</p></div><div class="headerActions"><button class="adminBtn" id="openAdmin" aria-label="Admin">⋯</button></div></header>
  <section id="banner" class="banner"><small>PRÓXIMO PARTIDO</small><h2>Cargando…</h2></section>
  <main>
    <section id="calendar" class="panel active"><div class="filters" id="dayFilters"></div><div class="filters" id="phaseFilters"></div><div id="calendarList"></div></section>
    <section id="search" class="panel"><h3 class="sectionTitle">BUSCAR PARTIDOS POR EQUIPO</h3><select id="teamSelect"></select><div id="teamMatches"></div></section>
    <section id="groups" class="panel"><h3 class="sectionTitle">CLASIFICACIÓN DE GRUPOS</h3><div id="groupsBox" class="gridGroups"></div></section>
    <section id="finals" class="panel"><h3 class="sectionTitle">CLASIFICACIÓN FINAL</h3><div id="placesBox" class="places"></div></section>
  </main>
</div>
<nav class="tabs"><div class="tabsInner"><button class="tab active" data-tab="calendar">Calendario</button><button class="tab" data-tab="search">Búsqueda</button><button class="tab" data-tab="groups">Grupos</button><button class="tab" data-tab="finals">Clasificación</button></div></nav>
<div class="admin" id="admin"><div class="adminBox"><h2>Ajustes</h2><section class="favoriteBox"><h3>Elige equipo favorito</h3><p class="status">El banner, el resaltado y la búsqueda se centrarán en este equipo.</p><select id="mainTeamSelect"></select></section><details class="advancedBox"><summary>Configuración avanzada</summary><label>URL Apps Script</label><input id="urlInput"><div class="btnRow"><button class="btn" id="saveUrl">Guardar URL</button></div><h3>Herramientas</h3><div class="btnRow"><button class="btn danger" id="clearBtn">Borrar resultados locales</button></div><p id="updateStatus" class="status"></p><h3>Simulador banner</h3><div class="btnRow"><button class="btn secondary" data-sim="normal">Estado normal</button><button class="btn secondary" data-sim="urgent">Falta &lt; 1 hora</button><button class="btn secondary" data-sim="live">En juego</button><button class="btn secondary" data-sim="auto">Volver automático</button></div></details><div class="btnRow"><button class="btn secondary" id="closeAdmin">Cerrar</button></div></div></div>
<script>
const LS={url:'wp_apps_url', main:'wp_main_team', results:'wp_results', status:'wp_status'};
let DATA, teams={}, matches=[], results={}, ranks={}, activeDay=null, activePhase=null, simMode='auto';
function groupsMap(){
  if(!DATA||!DATA.groups)return {};
  if(Array.isArray(DATA.groups)) return Object.fromEntries(DATA.groups.map(g=>[g.id,g.teams||[]]));
  return DATA.groups;
}
function groupIds(){ return Object.keys(groupsMap()); }
function groupTeams(id){ return groupsMap()[id]||[]; }
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
function up(s){return (s||'').toLocaleUpperCase('es-ES')}
function normCode(v){return String(v||'').toUpperCase().replace(/PARTIDO/g,'').replace(/\s+/g,'').replace(/^([A-Z]+)0*(\d+)$/,'$1$2').trim()}
function logo(team){return `logos/${team?.logo||DATA.settings.genericLogo}`}
function teamName(id){return teams[id]?.name||id||'—'}
function mainTeam(){return localStorage.getItem(LS.main)||DATA.settings.defaultMainTeam}
function isMain(id){return id && id===mainTeam()}
function matchById(id){return matches.find(m=>m.id===id)}
function hasResult(id){let r=results[id];return r&&Number.isFinite(r.a)&&Number.isFinite(r.b)}
function winnerId(id){let m=matchById(id),r=results[id]; if(!m||!hasResult(id)||r.a===r.b)return null; return resolveTeam(r.a>r.b?m.teamA:m.teamB)}
function loserId(id){let m=matchById(id),r=results[id]; if(!m||!hasResult(id)||r.a===r.b)return null; return resolveTeam(r.a<r.b?m.teamA:m.teamB)}
function refText(ref){ if(ref.team)return teamName(ref.team); if(ref.winner)return `GANADOR ${ref.winner}`; if(ref.loser)return `PERDEDOR ${ref.loser}`; if(ref.groupRank)return `${ref.groupRank.rank}º GRUPO ${ref.groupRank.group}`; return '—'}
function resolveTeam(ref, seen=new Set()){ if(!ref)return null; if(ref.team)return ref.team; if(ref.groupRank){let arr=ranks[ref.groupRank.group]||[];return arr[ref.groupRank.rank-1]?.id||null} let key=ref.winner||ref.loser; if(!key||seen.has(key))return null; seen.add(key); return ref.winner?winnerId(key):loserId(key)}
function displayRef(ref){let id=resolveTeam(ref); return {id, name:id?teamName(id):refText(ref), resolved:!!id}}
function dateTime(m){return new Date(`${m.date}T${m.time}:00`)}
function loadSaved(){ try{results=JSON.parse(localStorage.getItem(LS.results)||'{}')}catch{results={}} }
async function init(){ DATA=await fetch('campeonato.json',{cache:'no-store'}).then(r=>r.json()); teams=Object.fromEntries(DATA.teams.map(t=>[t.id,t])); matches=DATA.matches; loadSaved(); $('#appTitle').textContent='CAMPEONATO DE ESPAÑA INFANTIL MASCULINO 2026'; $('#appSub').textContent='SABADELL · 25-28 JUNIO 2026'; if(!localStorage.getItem(LS.url))localStorage.setItem(LS.url,DATA.settings.appsScriptUrl); compute(); setupControls(); renderAll(); if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})} }
function compute(){ ranks={}; for(const g of groupIds()){let rows=groupTeams(g).map(id=>({id,pj:0,pts:0,gf:0,gc:0,dg:0})); for(const m of matches.filter(x=>x.phase==='GRUPOS'&&x.group===g)){let r=results[m.id]; if(!hasResult(m.id))continue; let a=m.teamA.team,b=m.teamB.team,ra=rows.find(x=>x.id===a),rb=rows.find(x=>x.id===b); if(!ra||!rb)continue; ra.pj++;rb.pj++;ra.gf+=r.a;ra.gc+=r.b;rb.gf+=r.b;rb.gc+=r.a; if(r.a>r.b)ra.pts+=3; else if(r.a<r.b)rb.pts+=3; else{ra.pts++;rb.pts++} }
 rows.forEach(x=>x.dg=x.gf-x.gc); rows.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||teamName(a.id).localeCompare(teamName(b.id),'es')); ranks[g]=rows; } }
function updateQuickRefreshVisibility(tab){
  const q=$('#quickRefreshBtn');
  if(!q)return;
  q.style.display=(tab==='calendar'||tab==='search'||tab==='groups')?'':'none';
}

function setupControls(){ $$('.tab').forEach(b=>b.onclick=()=>{ $$('.tab,.panel').forEach(x=>x.classList.remove('active')); b.classList.add('active'); $('#'+b.dataset.tab).classList.add('active'); $('#banner').style.display=b.dataset.tab==='calendar'?'':'none'; if(b.dataset.tab==='search')renderTeamMatches(); }); $('#banner').style.display=''; $('#openAdmin').onclick=()=>{ const adv=document.querySelector('.advancedBox'); if(adv) adv.removeAttribute('open'); $('#admin').classList.add('open'); }; $('#closeAdmin').onclick=()=>$('#admin').classList.remove('open'); $('#urlInput').value=localStorage.getItem(LS.url)||''; $('#saveUrl').onclick=()=>{localStorage.setItem(LS.url,$('#urlInput').value.trim()); setStatus('URL guardada.');}; const opts=DATA.teams.slice().sort((a,b)=>shortTeamName(a.id).localeCompare(shortTeamName(b.id),'es')).map(t=>`<option value="${t.id}">${up(shortTeamName(t.id))}</option>`).join(''); $('#teamSelect').innerHTML=opts; $('#mainTeamSelect').innerHTML=opts; $('#teamSelect').value=mainTeam(); $('#mainTeamSelect').value=mainTeam(); $('#teamSelect').onchange=renderTeamMatches; $('#mainTeamSelect').onchange=e=>{localStorage.setItem(LS.main,e.target.value); $('#teamSelect').value=e.target.value; renderAll()}; if($('#clearBtn')) $('#clearBtn').onclick=clearResults; $$('[data-sim]').forEach(b=>b.onclick=()=>{simMode=b.dataset.sim; renderBanner();}); }
function filterButtons(){ let days=DATA.settings.days, phases=DATA.settings.visiblePhases; $('#dayFilters').classList.add('dayRow'); $('#dayFilters').innerHTML=`<div class="dayChips">${days.map(d=>`<button class="chip ${activeDay===d?'active':''}" data-day="${d}">${d}</button>`).join('')}</div><button class="refreshInline" id="dayRefreshBtn" type="button">↻ Actualizar</button>`; $('#phaseFilters').innerHTML=phases.map(p=>`<button class="chip ${activePhase===p?'active':''}" data-phase="${p}">${p}</button>`).join(''); $$('[data-day]').forEach(b=>{let d=b.dataset.day; b.disabled=!matches.some(m=>m.dayLabel===d&&(!activePhase||m.phase===activePhase)); b.onclick=()=>{activeDay=activeDay===d?null:d; renderCalendar()}}); $$('[data-phase]').forEach(b=>{let p=b.dataset.phase; b.disabled=!matches.some(m=>m.phase===p&&(!activeDay||m.dayLabel===activeDay)); b.onclick=()=>{activePhase=activePhase===p?null:p; renderCalendar()}}); const rb=$('#dayRefreshBtn'); if(rb) rb.onclick=refreshResults; }
function renderAll(){ compute(); filterButtons(); renderBanner(); renderCalendar(); renderSelectors(); renderTeamMatches(); renderGroups(); renderFinals(); }
function renderSelectors(){ $('#mainTeamSelect').value=mainTeam(); }
function renderCalendar(){ filterButtons(); let list=matches.filter(m=>(!activeDay||m.dayLabel===activeDay)&&(!activePhase||m.phase===activePhase)); $('#calendarList').innerHTML=list.map(matchCard).join('')||'<p class="muted">No hay partidos con esos filtros.</p>'; }
function teamBlock(ref, side){let d=displayRef(ref), t=teams[d.id]; let img=`<img class="crest" src="${d.id?logo(t):'logos/'+DATA.settings.genericLogo}" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logos/${DATA.settings.genericLogo}';}">`; let name=`<div class="teamName">${up(d.name)}</div>`; return `<div class="team ${side==='right'?'right':'left'}">${side==='right'?img+name:name+img}</div>`}
function visiblePhaseLabel(m){
  if(m.phase==='GRUPOS')return `GRUPO ${m.group||''}`.trim();
  let ph=m.phase==='SEMIS'?'SEMIS':m.phase;
  if(m.bracket)return `${ph} (PUESTOS ${m.bracket})`;
  return up(m.label||m.phase);
}
function bannerPhaseLabel(m){ if(m.phase==='GRUPOS')return 'FASE DE GRUPOS'; return visiblePhaseLabel(m);}
function visibleMatchLabel(m){return `${visiblePhaseLabel(m)} · PARTIDO ${m.id}`}
function isGroupComplete(g){let gm=matches.filter(x=>x.phase==='GRUPOS'&&x.group===g); return gm.length>0 && gm.every(x=>hasResult(x.id));}
function confirmedWinnerId(id, seen=new Set()){let m=matchById(id),r=results[id]; if(!m||!hasResult(id)||r.a===r.b)return null; let side=r.a>r.b?m.teamA:m.teamB; return resolveTeamConfirmed(side, seen);}
function confirmedLoserId(id, seen=new Set()){let m=matchById(id),r=results[id]; if(!m||!hasResult(id)||r.a===r.b)return null; let side=r.a<r.b?m.teamA:m.teamB; return resolveTeamConfirmed(side, seen);}
function resolveTeamConfirmed(ref, seen=new Set()){ if(!ref)return null; if(ref.team)return ref.team; if(ref.groupRank){ if(!isGroupComplete(ref.groupRank.group))return null; let arr=ranks[ref.groupRank.group]||[]; return arr[ref.groupRank.rank-1]?.id||null; } let key=ref.winner||ref.loser; if(!key||seen.has(key))return null; seen.add(key); return ref.winner?confirmedWinnerId(key,seen):confirmedLoserId(key,seen);}
function displayRefConfirmed(ref){let id=resolveTeamConfirmed(ref); return {id, name:id?teamName(id):refText(ref), resolved:!!id}}
function centerBox(m){
  let r=results[m.id];
  if(hasResult(m.id)) return `<div class="centerBox"><div class="scoreText">${r.a} - ${r.b}</div><div class="state">Final</div></div>`;
  return `<div class="centerBox"><div class="date">${dayText(dateTime(m), new Date())}</div><div class="time">${m.time}</div><div class="field">${m.field}</div></div>`;
}
function matchCard(m){
  let a=displayRef(m.teamA).id, b=displayRef(m.teamB).id, cls=(isMain(a)||isMain(b))?' mainTeam':'';
  return `<article class="card${cls}"><div class="matchTop"><span class="phaseLabel">${visiblePhaseLabel(m)}</span><span class="codeLabel">PARTIDO ${m.id}</span></div><div class="teams">${teamBlock(m.teamA,'left')}<div class="score">${centerBox(m)}</div>${teamBlock(m.teamB,'right')}</div></article>`;
}
function renderTeamMatches(){let id=$('#teamSelect').value||mainTeam(); let list=matches.filter(m=>resolveTeamConfirmed(m.teamA)===id||resolveTeamConfirmed(m.teamB)===id); $('#teamMatches').innerHTML=list.map(matchCard).join('')||'<p class="muted">No hay partidos confirmados para este equipo todavía.</p>';}
function refCouldBecome(ref,id){ if(ref.team)return ref.team===id; if(ref.groupRank)return groupTeams(ref.groupRank.group).includes(id); if(ref.winner||ref.loser){let m=matchById(ref.winner||ref.loser); return m&&(refCouldBecome(m.teamA,id)||refCouldBecome(m.teamB,id));} return false;}
function renderGroups(){ $('#groupsBox').innerHTML=groupIds().map(g=>`<div class="card"><h3>GRUPO ${g}</h3><table class="table"><thead><tr><th>Equipo</th><th>Pts</th><th>DG</th><th>GF</th><th>PJ</th></tr></thead><tbody>${(ranks[g]||[]).map(x=>`<tr class="${isMain(x.id)?'mainTeam':''}"><td>${up(teamName(x.id))}</td><td>${x.pts}</td><td>${x.dg}</td><td>${x.gf}</td><td>${x.pj}</td></tr>`).join('')}</tbody></table></div>`).join(''); }
function finalTeam(place){let fp=(DATA.finalPlaces||[]).find(x=>x.place===place);return fp?resolveTeam(fp.source):null}
function renderFinals(){let html=''; for(let i=1;i<=24;i++){let id=finalTeam(i), t=teams[id]; html+=`<div class="place ${isMain(id)?'mainTeam':''}"><span class="placeNum">${i}º</span><img class="crest" src="${id?logo(t):'logos/'+DATA.settings.genericLogo}" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logos/${DATA.settings.genericLogo}';}"><span>${id?up(teamName(id)):'—'}</span></div>`} $('#placesBox').innerHTML=html; }
const SHORT_NAMES={"BRAINS": "BRAINS", "BARCELONETA": "BARCELONETA", "ASKARTZA": "ASKARTZA", "MALAGA": "MÁLAGA", "MORVEDRE": "MORVEDRE", "CABALLA": "CABALLA", "HELIOS": "HELIOS", "LAS_PALMAS": "LAS PALMAS", "SOLLER": "SÓLLER", "NAVARRA": "NAVARRA", "CARTHAGO": "CARTHAGO", "BARCELONA": "BARCELONA", "TENERIFE_ECHEYDE": "ECHEYDE", "OLIVAR": "OLIVAR", "TURIA": "TURIA", "ALGECIRAS": "ALGECIRAS", "LEIOA": "LEIOA", "TRUDGEON_SESTAO": "SESTAO", "SABADELL": "SABADELL", "MEDITERRANI": "MEDITERRANI", "ALCORCON": "ALCORCÓN", "HORTA": "HORTA", "CANOE": "CANOE", "ENCINAS": "ENCINAS"};
function shortTeamName(id){return SHORT_NAMES[id]||teamName(id)}
function renderBanner(){
  let mt=mainTeam(), now=new Date(), relevant=matches.filter(m=>resolveTeamConfirmed(m.teamA)===mt||resolveTeamConfirmed(m.teamB)===mt).sort((a,b)=>dateTime(a)-dateTime(b));
  let pending=relevant.find(m=>!hasResult(m.id));
  let cls='banner', html='';
  if(!pending){
    let place=[...Array(24)].map((_,i)=>i+1).find(p=>finalTeam(p)===mt);
    html=`<div class="bannerCompactTop"><span class="bannerInfo">PARTICIPACIÓN FINALIZADA</span><small>${up(shortTeamName(mt))}</small><span class="bannerSpacer"></span></div><div class="bannerCenterBox"><div class="date">PUESTO FINAL</div><div class="time">${place?place+'º':'—'}</div></div>`;
  }else{
    let dt=dateTime(pending), diff=dt-now, mins=Math.floor(diff/60000); let mode=simMode;
    if(mode==='auto'){ if(diff<=0&&diff>-40*60000)mode='live'; else if(diff>0&&diff<60*60000)mode='urgent'; else mode='normal'; }
    if(simMode!=='auto')cls+=' test'; if(mode==='urgent')cls+=' urgent'; if(mode==='live')cls+=' live';
    let a=displayRefConfirmed(pending.teamA), b=displayRefConfirmed(pending.teamB);
    let title=mode==='live'?`EN JUEGO ${up(shortTeamName(mt))}`:mode==='urgent'?`FALTAN ${Math.max(0,mins)} MIN · ${up(shortTeamName(mt))}`:`PRÓXIMO PARTIDO ${up(shortTeamName(mt))}`;
    let box=mode==='live'?`<div class="date">EN JUEGO</div><div class="time">${pending.time}</div><div class="field">${pending.field}</div>`:`<div class="date">${dayText(dt, now)}</div><div class="time">${pending.time}</div><div class="field">${pending.field}</div>`;
    html=`<div class="bannerCompactTop"><span class="bannerInfo">${bannerPhaseLabel(pending)}</span><small>${title}</small><span class="bannerSpacer"></span></div><div class="bannerTeams"><div class="bannerTeam"><img class="crest big" src="${a.id?logo(teams[a.id]):'logos/'+DATA.settings.genericLogo}" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logos/${DATA.settings.genericLogo}';}"><div class="bannerTeamName">${up(a.name)}</div></div><div class="bannerCenterBox">${box}</div><div class="bannerTeam"><img class="crest big" src="${b.id?logo(teams[b.id]):'logos/'+DATA.settings.genericLogo}" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logos/${DATA.settings.genericLogo}';}"><div class="bannerTeamName">${up(b.name)}</div></div></div>`;
  }
  $('#banner').className=cls; $('#banner').innerHTML=html;
}
function dayText(dt, now){let d0=new Date(now.getFullYear(),now.getMonth(),now.getDate()), d1=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()); let dd=Math.round((d1-d0)/86400000); if(dd===0)return 'HOY'; if(dd===1)return 'MAÑANA'; let days=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB']; return `${days[dt.getDay()]} ${dt.getDate()}`;}
function parseSheetResponse(text){
  text=String(text||'').trim();
  // El Apps Script actual devuelve JSONP: callback([...]);
  const jsonp=text.match(/^[^(]*\((.*)\)\s*;?$/s);
  if(jsonp) text=jsonp[1];
  return JSON.parse(text);
}
async function refreshResults(){let q=$('#dayRefreshBtn'); if(q){q.className='refreshInline loading';q.textContent='Actualizando…';} let url=localStorage.getItem(LS.url); if(!url){setStatus('Error: falta URL Apps Script.'); if(q){q.className='refreshInline err';q.textContent='Error';} return} setStatus('Actualizando…'); try{let txt=await fetch(url,{cache:'no-store'}).then(r=>r.text()); let raw=parseSheetResponse(txt); let rows=Array.isArray(raw)?raw:(raw.results||raw.data||raw.values||[]); let next={}; for(const row of rows){let code=normCode(row.Partido??row.partido??row.codigo??row.Codigo??row[0]); let a=Number(row['Goles A']??row.golesA??row.goles_a??row.a??row.A??row[1]); let b=Number(row['Goles B']??row.golesB??row.goles_b??row.b??row.B??row[2]); if(code&&Number.isFinite(a)&&Number.isFinite(b))next[code]={a,b}; } results=next; localStorage.setItem(LS.results,JSON.stringify(results)); let stamp=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); setStatus(`Actualizado a las ${stamp}. Resultados cargados: ${Object.keys(results).length}`); if(q){q.className='refreshInline ok';q.textContent='Actualizado'; setTimeout(()=>{const n=$('#dayRefreshBtn'); if(n){n.className='refreshInline';n.textContent='↻ Actualizar';}},1600);} renderAll(); }catch(e){console.error(e); if(q){q.className='refreshInline err';q.textContent='Error'; setTimeout(()=>{const n=$('#dayRefreshBtn'); if(n){n.className='refreshInline';n.textContent='↻ Actualizar';}},2200);} setStatus('Error al conectar o leer resultados. Revisa que el Apps Script devuelva JSON/JSONP válido.');}}
function clearResults(){ if(!confirm('Esto borra sólo los resultados guardados en este móvil/navegador. No afecta al Google Sheet. ¿Continuar?'))return; results={}; localStorage.removeItem(LS.results); setStatus('Resultados locales borrados. Google Sheet intacto.'); renderAll();}
function setStatus(t){$('#updateStatus').textContent=t; localStorage.setItem(LS.status,t)}
init().catch(e=>{document.body.innerHTML='<pre>Error cargando la app: '+e.message+'</pre>'})
</script>
